<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#1a73e8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="color-scheme" content="light dark">
<title>플래너</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="errDisplay" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:#fff;z-index:99999;padding:20px;font-size:13px;color:red;overflow:auto;white-space:pre-wrap"></div>
<div class="app" id="app">
  <div class="topnav" id="topNav">
    <div class="topnav-row1">
      <div class="tnav-center">
        <button class="tarr" id="tPrev" onclick="prevP()">◀</button>
        <div class="tnav-date" id="navDate"></div>
        <button class="tarr" id="tNext" onclick="nextP()">▶</button>
      </div>
      <button class="ttoday" id="tToday" onclick="goToday()" style="position:absolute;right:12px;">오늘</button>
    </div>
    <div class="topnav-row2" id="tnavLeft" style="display:none">
      <button class="cvbtn active" id="cvMonth" onclick="setCalView('month')">월간</button>
      <button class="cvbtn" id="cvWeek" onclick="setCalView('week')">주간</button>
      <button class="cvbtn" id="cvDay" onclick="setCalView('day')">일간</button>
    </div>
  </div>

  <div class="content">
    <!-- CAL PAGE -->
    <div class="page active" id="pageCal">
      <div class="spanel active" id="spMonth" style="flex-direction:column">
        <div class="mgh" id="mghRow"></div>
        <div class="mgrid"><div class="mweeks" id="monthWeeks"></div></div>
      </div>
      <div class="spanel" id="spWeek"><div class="wscroll" id="weekScroll"></div></div>
      <div class="spanel" id="spDay" style="flex-direction:column">
        <div class="stabs">
          <button class="stab active" onclick="switchDTab('schedule')">일정</button>
          <button class="stab" onclick="switchDTab('memo')">메모</button>
        </div>
        <div class="spanel active" id="dspSch" style="flex-direction:row;flex:1;overflow:hidden">
          <div class="day-left">
            <div class="sscroll"><div class="tgrid" id="tGrid" style="position:relative"></div></div>
          </div>
          <div class="day-right" id="dayRight"></div>
        </div>
        <div class="spanel" id="dspMemo"></div>
      </div>
    </div>

    <!-- TODO PAGE -->
    <div class="page" id="pageTodo">
      <div class="todo-page" id="todoPage"></div>
    </div>

    <!-- SCHOOL PAGE -->
    <div class="page" id="pageSchool">
      <div class="stabs">
        <button class="stab active" onclick="switchSchTab('tt')">시간표</button>
        <button class="stab" onclick="switchSchTab('asgn')">과제/시험</button>
      </div>
      <div class="spanel active" id="spTT">
        <div class="ttscroll" id="ttScroll"></div>
        <div class="ttadd-row"><button class="ttadd-btn" onclick="openClsModal()">+ 수업 추가</button></div>
      </div>
      <div class="spanel" id="spAsgn" style="flex-direction:column">
        <div class="ascroll" id="asgnList"></div>
        <div class="ttadd-row"><button class="ttadd-btn" style="border-color:var(--bd-danger);background:var(--bg-danger);color:var(--tx-danger)" onclick="openAsgnModal()">+ 과제 / 시험 추가</button></div>
      </div>
    </div>

    <!-- OPTIONS PAGE -->
    <div class="page" id="pageOpts"><div class="optscroll" id="optsContent"></div></div>
  </div>

  <button class="fab" id="fab" onclick="onFab()">+</button>
  <div class="botnav">
    <button class="bni active" id="bniCal" onclick="switchPage('cal')">
      <span class="bni-icon">📅</span><span class="bni-label">달력</span>
    </button>
    <button class="bni" id="bniTodo" onclick="switchPage('todo')">
      <span class="bni-icon">✅</span><span class="bni-label">할 일</span>
    </button>
    <button class="bni" id="bniSchool" onclick="switchPage('school')">
      <span class="bni-icon">🎓</span><span class="bni-label">학교</span>
    </button>
    <button class="bni" id="bniOpts" onclick="switchPage('opts')">
      <span class="bni-icon">⚙️</span><span class="bni-label">옵션</span>
    </button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
